name: Track code scanning alerts

on:
  code_scanning_alert:
    types: [created]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      security-events: read
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const alert = context.payload.alert;
            const rule = alert.rule;
            const ref = context.payload.ref;
            const tool = context.payload.tool.name;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[${tool}] ${rule.description}`,
              body: [
                `**Severity:** ${rule.severity ?? 'unknown'}`,
                `**Rule:** \`${rule.id}\``,
                `**Ref:** \`${ref}\``,
                `**Alert:** ${alert.html_url}`,
              ].join('\n'),
              assignees: ['facastagnini'],
              labels: ['security'],
            });
