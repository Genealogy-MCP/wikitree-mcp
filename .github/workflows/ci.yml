name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Format
        run: uv run ruff format --check src tests

      - name: Check copyright headers
        run: find src/ scripts/ tests/ -name '*.py' -exec python scripts/check_copyright_header.py {} +

      - name: Type check
        run: uv run pyright src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            name: "py3.10"
          - python-version: "3.11"
            name: "py3.11"
          - python-version: "3.12"
            name: "py3.12"
          - python-version: "3.13"
            name: "py3.13"
    name: test (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Test
        run: uv run coverage run -m pytest tests/ -v

      - name: Coverage
        run: uv run coverage report

  security-audit:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Security audit
        run: uv run pip-audit
